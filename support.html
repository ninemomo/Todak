<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support · Todak Time</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #07090f;
      color: #f1f3f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .wordmark {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2563EB;
      margin-bottom: 48px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
    }

    p {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    a.btn {
      font-size: 14px;
      font-weight: 500;
      color: #f1f3f7;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 11px 24px;
      transition: border-color 0.15s, color 0.15s;
    }

    a.btn:hover {
      border-color: rgba(255,255,255,0.3);
      color: #ffffff;
    }

    footer {
      position: fixed;
      bottom: 32px;
      font-size: 12px;
      color: #2e3340;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <div class="wordmark">Todak Time</div>

  <h1>Support</h1>
  <p>For any questions or feedback,<br>reach out via email.</p>

  <a class="btn" href="mailto:ninemomo.public@gmail.com">ninemomo.public@gmail.com</a>

  <footer>© 2025 Todak Time</footer>

</body>
</html>
